# ===============================================================================
# 功能：JitPack 构建配置（单模块纯 Java 库）。
# 说明：
#   1. 纯 java-library，不依赖 Android SDK——JitPack 容器无 dl.google.com 网络，
#      Android AAR（compileSdk 36 / build-tools 36）在此不可构建；纯 JAR 只需 JDK，稳过。
#   2. jdk openjdk17：JitPack 最稳 JDK；StringFogRuntime 仅用 Base64，17 足够。
#   3. install：发布唯一 JAR 到 mavenLocal，JitPack 据此对外提供 com.github.Pangu-Immortal:StringFogPro:<tag>。
# ===============================================================================
jdk:
  - openjdk17
install:
  - ./gradlew publishToMavenLocal --no-daemon --stacktrace
