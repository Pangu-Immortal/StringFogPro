# ===============================================================================
# 功能：sample-agp8 独立构建的 Gradle Wrapper 配置。
# 说明：多 AGP 版本适配矩阵第二档——AGP 8.7.3 + Gradle 8.13 工具链验证。
#   wrapper jar 与版本无关（直接复用主构建的 jar），仅 distributionUrl 指向 Gradle 8.13。
#   （本地实测时曾因官方 zip 下载中断损坏，改用校验通过的本地 zip 完成构建；
#    此处提交标准官方 URL 以便他人可复现，下载完整即可。）
# ===============================================================================
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.13-bin.zip
