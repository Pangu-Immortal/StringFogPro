# ===============================================================================
# StringFogPro 工程级 Gradle 配置（多模块纯 JVM：运行时库 + Gradle 插件）。
# ===============================================================================

# JVM 参数：内存 + UTF-8 编码（保证中文注释/中文字符串加解密字节一致）。
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# 并行 + 构建缓存：加速多模块构建（纯 JVM，无 Android，安全开启）。
org.gradle.parallel=true
org.gradle.caching=true
