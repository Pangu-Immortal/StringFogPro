# StringFogPro 工程级 Gradle 配置。
# 与上游 VirtualApp 主工程对齐，保证字节码/加密行为完全一致。

# JVM 参数：内存 + UTF-8 + 关闭 R8 API 建模（AGP 9.2.1 已知 NPE 规避）+ 清空代理 host。
org.gradle.jvmargs=-Xmx4096m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -Dcom.android.tools.r8.disableApiModeling=1 -Dhttp.proxyHost= -Dhttps.proxyHost=

org.gradle.parallel=true
android.useAndroidX=true
android.enableJetifier=true
